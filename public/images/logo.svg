<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Outer wheel - thicker for small sizes -->
  <circle cx="32" cy="32" r="27" fill="none" stroke="#8B2500" stroke-width="6"/>
  <!-- Hub - larger and more visible -->
  <circle cx="32" cy="32" r="7" fill="#FFD100" stroke="#8B2500" stroke-width="2"/>
  <!-- 4 spokes - thicker, no diagonals -->
  <line x1="32" y1="5" x2="32" y2="25" stroke="#8B2500" stroke-width="3"/>
  <line x1="32" y1="39" x2="32" y2="59" stroke="#8B2500" stroke-width="3"/>
  <line x1="5" y1="32" x2="25" y2="32" stroke="#8B2500" stroke-width="3"/>
  <line x1="39" y1="32" x2="59" y2="32" stroke="#8B2500" stroke-width="3"/>
</svg>
