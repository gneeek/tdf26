<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle for visibility on dark themes -->
  <circle cx="32" cy="32" r="31" fill="#8B2500"/>
  <!-- Outer wheel - black like a real tyre -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#222" stroke-width="5"/>
  <!-- Hub -->
  <circle cx="32" cy="32" r="6" fill="#FFD100" stroke="#222" stroke-width="1.5"/>
  <!-- 6 spokes - silver/light grey -->
  <line x1="32" y1="6" x2="32" y2="26" stroke="#CCC" stroke-width="2"/>
  <line x1="32" y1="38" x2="32" y2="58" stroke="#CCC" stroke-width="2"/>
  <line x1="9.5" y1="19" x2="27" y2="29" stroke="#CCC" stroke-width="2"/>
  <line x1="37" y1="35" x2="54.5" y2="45" stroke="#CCC" stroke-width="2"/>
  <line x1="54.5" y1="19" x2="37" y2="29" stroke="#CCC" stroke-width="2"/>
  <line x1="27" y1="35" x2="9.5" y2="45" stroke="#CCC" stroke-width="2"/>
</svg>
